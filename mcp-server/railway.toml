# Configuración de despliegue en Railway para el MCP remoto.
# El servicio de Railway debe tener su "Root Directory" = mcp-server
[build]
builder = "nixpacks"

[deploy]
startCommand = "node http.js"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
